<!DOCTYPE html>
<html>
<head>
    <title>Traffic Detection</title>
</head>
<body>

<h2>Upload Video</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="video">
    <button type="submit">Upload</button>
</form>

{% if video %}
    <video width="600" controls>
        <source src="{{ url_for('static', filename=video) }}">
    </video>
{% endif %}

</body>
</html>
